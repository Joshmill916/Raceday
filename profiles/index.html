<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driven — Your Racing Record</title>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<!-- Installable app (PWA): home-screen icon, full-screen, offline app shell -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1f6fd6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Driven">
<link rel="apple-touch-icon" href="icon-driven.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-driven.png">
<script>if('serviceWorker' in navigator){addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})})}</script>
<style>
  :root {
    /* Dark stack — layered near-blacks (broadcast surfaces), never one flat gray */
    --ink-0: #0b0c10;
    --ink-1: #12141a;
    --ink-2: #1a1d25;
    --ink-3: #242834;
    --line-d: rgba(255,255,255,.09);
    --td: #f5f6f8;
    --td-mute: #8f939d;
    /* Light body */
    --bg: #eef0f3;
    --surface: #ffffff;
    --ink: #14161a;
    --muted: #666b74;
    --line: #e3e5e9;
    --brand: #1f6fd6;        /* Driven Blue — the app's own accent (number plates stay yellow) */
    --gold: #d9980f;         /* P1 / wins */
    --plate: #ffd449;
    --plate-ink: #161408;
    --pit-red: #c8372d;
    --pit-red-bg: #fdeeec;
    --flag-green: #0e8a4d;
    --flag-green-bg: #e7f6ee;
    --display: 'Saira Condensed', 'Arial Narrow', sans-serif;
    --body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    /* Back-compat aliases (older selectors/JS) */
    --asphalt: #12141a;
    --asphalt-2: #1a1d25;
    --paper: #eef0f3;
    --card: #ffffff;
    --accent: #1f6fd6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: var(--body); background: var(--bg); color: var(--ink); font-size: 15px; line-height: 1.45; }
  .container { max-width: 640px; margin: 0 auto; padding: 0 0 64px; }

  .header { background: var(--ink-0); color: #fff; padding: 16px 20px 12px; }
  .header .brand { font-family: var(--display); font-weight: 800; font-size: 21px; letter-spacing: 0.16em; text-transform: uppercase; display: inline-block; border-bottom: 3px solid var(--brand); padding-bottom: 3px; }
  .header .tag { display: none; }
  .checker { display: none; }

  .nav { background: var(--ink-0); display: flex; overflow-x: auto; position: sticky; top: 0; z-index: 20; border-bottom: 1px solid var(--line-d); }
  .nav button { flex: 1; padding: 12px 10px 10px; border: none; background: transparent; color: #79808c; font-size: 13px; font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
  .nav button.active { color: #fff; border-bottom-color: var(--brand); }

  .page { display: none; padding: 20px; }
  .page.active { display: block; }
  .bleed { margin: -20px -20px 20px; }
  h2 { font-family: var(--display); font-weight: 800; font-size: 26px; text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: 2px; }
  h3 { font-family: var(--display); font-weight: 700; font-size: 18px; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
  .card { background: var(--surface); border: none; border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; box-shadow: 0 1px 3px rgba(15,18,26,.07), 0 1px 2px rgba(15,18,26,.05); }
  .slbl { display: flex; align-items: center; gap: 8px; font-family: var(--display); font-size: 12.5px; font-weight: 700; color: #5b606a; text-transform: uppercase; letter-spacing: 0.12em; margin: 22px 0 10px; }
  .slbl::before { content: ''; width: 4px; height: 14px; border-radius: 2px; background: var(--brand); flex: none; }
  .slbl:first-child { margin-top: 0; }

  /* ---- Driver hero (dark broadcast band, Home) ---- */
  .hero { position: relative; overflow: hidden; color: var(--td); padding: 26px 20px 0;
    background: linear-gradient(165deg, var(--ink-2), var(--ink-0) 70%);
    background: radial-gradient(130% 100% at 100% 0%, color-mix(in srgb, var(--tc, var(--brand)) 26%, transparent), transparent 55%), linear-gradient(165deg, var(--ink-2), var(--ink-0) 70%); }
  .hero-num { position: absolute; top: -20px; right: -6px; font-family: var(--display); font-weight: 800; font-style: italic; font-size: 150px; line-height: 1; letter-spacing: -0.02em; pointer-events: none; user-select: none;
    color: rgba(110,168,240,.13); -webkit-text-stroke: 1.5px rgba(110,168,240,.4);
    color: color-mix(in srgb, var(--tc, var(--brand)) 13%, transparent); -webkit-text-stroke: 1.5px color-mix(in srgb, var(--tc, var(--brand)) 42%, transparent); }
  .hero-main { position: relative; display: flex; align-items: center; gap: 16px; padding-bottom: 22px; }
  .hero-photo { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--tc, var(--brand)); background: #000; flex: none; }
  .hero-disc { width: 76px; height: 76px; border-radius: 50%; background: var(--ink-3); border: 2.5px solid var(--tc, var(--brand)); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 30px; flex: none; }
  .hero-name { font-family: var(--display); font-weight: 800; font-size: 33px; line-height: 0.95; text-transform: uppercase; letter-spacing: 0.01em; }
  .hero-meta { margin-top: 7px; font-family: var(--display); font-weight: 700; font-size: 13.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #6ea8f0; color: color-mix(in srgb, var(--tc, var(--brand)) 60%, #fff); }
  .hero-stats { position: relative; display: grid; grid-template-columns: repeat(3, 1fr); border-top: 1px solid var(--line-d); }
  .hero-stats > div { padding: 14px 8px 17px; text-align: center; border-left: 1px solid var(--line-d); }
  .hero-stats > div:first-child { border-left: none; }
  .hero-stats b { display: block; font-family: var(--display); font-weight: 800; font-size: 31px; line-height: 1; font-variant-numeric: tabular-nums; }
  .hero-stats span { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--td-mute); font-weight: 600; }

  label { font-size: 12.5px; color: #555; display: block; margin: 16px 0 5px; font-weight: 600; }
  label:first-child { margin-top: 0; }
  input[type="text"], input[type="number"], input[type="email"], textarea, select { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid #d5d8de; background: #fff; color: var(--ink); font-size: 16px; font-family: inherit; outline: none; transition: border-color .15s; }
  textarea { resize: vertical; min-height: 80px; }
  input:focus, textarea:focus, select:focus { border-color: var(--brand); }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 12px 20px; border-radius: 10px; border: 1.5px solid #d5d8de; background: #fff; color: var(--ink); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
  .btn:hover { background: #f4f5f7; }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn svg { width: 15px; height: 15px; flex: none; }
  .btn-primary { background: var(--ink-1); color: #fff; border-color: var(--ink-1); }
  .btn-primary:hover { background: var(--ink-3); }
  .btn-go { background: var(--brand); color: #fff; border-color: var(--brand); font-family: var(--display); font-weight: 800; font-size: 17px; text-transform: uppercase; letter-spacing: 0.05em; }
  .btn-go:hover { background: #1a5fb8; }
  .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; }
  .btn-danger { border-color: #f0c4c0; color: var(--pit-red); background: var(--pit-red-bg); }
  .btn-danger:hover { background: #fadfdb; }
  .btn-block { width: 100%; margin-top: 4px; }

  .disc { width: 64px; height: 64px; border-radius: 50%; background: var(--plate); color: var(--plate-ink); display: inline-flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 26px; flex-shrink: 0; box-shadow: inset 0 0 0 2.5px rgba(20,16,2,.9), inset 0 0 0 5.5px var(--plate), 0 1px 3px rgba(0,0,0,.18); }

  /* Feed rows (results) */
  .hb { border: none; border-radius: 14px; margin-bottom: 12px; overflow: hidden; background: var(--surface); box-shadow: 0 1px 3px rgba(15,18,26,.07), 0 1px 2px rgba(15,18,26,.05); }
  .hr { display: flex; align-items: center; padding: 12px 14px; border-top: 1px solid var(--line); gap: 12px; font-size: 14px; }
  .hr:first-child { border-top: none; }
  .posb { width: 40px; height: 40px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 16px; flex: none; background: #eceef2; color: var(--ink); }
  .posb.pod { background: var(--ink-1); color: #fff; }
  .posb.p1 { background: linear-gradient(160deg, #f0b429, #d9980f); color: #231a02; }
  .hr .nm { flex: 1; min-width: 0; overflow: hidden; }
  .hr .nm b { font-size: 14.5px; display: block; }
  .hr .nm span { color: var(--muted); font-size: 12.5px; }
  .hr .pts { margin-left: auto; text-align: right; flex: none; font-family: var(--display); font-weight: 800; font-size: 17px; font-variant-numeric: tabular-nums; line-height: 1.1; }
  .hr .pts span { display: block; font-size: 9.5px; letter-spacing: 0.14em; color: var(--muted); font-weight: 600; }
  .empty { font-size: 13.5px; color: var(--muted); padding: 14px 0; line-height: 1.6; }

  /* Stats page — scoreboard blocks, not tables */
  .cls-row { padding: 15px 0 13px; border-top: 1px solid var(--line); }
  .cls-row:first-child { border-top: none; padding-top: 2px; }
  .cls-name { font-family: var(--display); font-weight: 800; font-size: 17px; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 9px; }
  .trio { display: grid; grid-template-columns: repeat(3, 1fr); }
  .trio > div { border-left: 1px solid var(--line); padding-left: 14px; }
  .trio > div:first-child { border-left: none; padding-left: 0; }
  .trio b { display: block; font-family: var(--display); font-weight: 800; font-size: 26px; line-height: 1; font-variant-numeric: tabular-nums; }
  .trio b.w { color: var(--brand); }
  .trio span { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; padding: 8px 10px; font-weight: 700; color: #777; border-bottom: 1px solid var(--line); font-size: 11.5px; text-transform: uppercase; letter-spacing: .04em; }
  td { padding: 9px 10px; border-bottom: 1px solid #eef0f3; vertical-align: middle; }
  tr.totals td { border-top: 2px solid var(--line); border-bottom: none; font-weight: 700; }
  .divider { border: none; border-top: 1px solid var(--line); margin: 18px 0; }

  /* Basic (free) card — light, editorial */
  .bcard { background: var(--surface); border-radius: 16px; box-shadow: 0 1px 3px rgba(15,18,26,.07), 0 1px 2px rgba(15,18,26,.05); overflow: hidden; margin-bottom: 14px; }
  .bcard-hd { display: flex; align-items: center; gap: 15px; padding: 20px; border-bottom: 1px solid var(--line); }
  .bcard-photo { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; flex: none; background: #e7e9ee; }
  .bcard-disc { width: 64px; height: 64px; border-radius: 50%; background: var(--ink-1); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 25px; flex: none; }
  .bcard-name { font-family: var(--display); font-weight: 800; font-size: 25px; line-height: 0.98; text-transform: uppercase; }
  .bcard-meta { margin-top: 5px; font-family: var(--display); font-weight: 700; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
  .bcard-body { padding: 16px 20px 18px; font-size: 14px; }

  /* Upgrade (mid) card — light with team color accent + photo */
  .mcard { background: var(--surface); border-radius: 16px; box-shadow: 0 1px 3px rgba(15,18,26,.07), 0 1px 2px rgba(15,18,26,.05); overflow: hidden; margin-bottom: 14px; border-top: 4px solid var(--mc-team, var(--brand)); }
  .mcard-hd { display: flex; align-items: center; gap: 15px; padding: 20px; border-bottom: 1px solid var(--line); background: linear-gradient(to right, color-mix(in srgb, var(--mc-team, var(--brand)) 6%, transparent), transparent); }
  .mcard-photo { width: 72px; height: 72px; border-radius: 9px; object-fit: cover; flex: none; background: #e7e9ee; border: 1.5px solid var(--mc-team, var(--brand)); }
  .mcard-disc { width: 72px; height: 72px; border-radius: 9px; background: color-mix(in srgb, var(--mc-team, var(--brand)) 12%, #eef0f3); color: var(--ink); display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 28px; flex: none; border: 1.5px solid var(--mc-team, var(--brand)); }
  .mcard-name { font-family: var(--display); font-weight: 800; font-size: 26px; line-height: 0.97; text-transform: uppercase; }
  .mcard-meta { margin-top: 6px; font-family: var(--display); font-weight: 700; font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.07em; color: color-mix(in srgb, var(--mc-team, var(--brand)) 70%, var(--muted)); }
  .mcard-body { padding: 16px 20px 18px; font-size: 14px; }
  .mcard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; margin: 0 -20px -18px; padding: 12px 0 0; border-top: 1px solid var(--line); }
  .mcard-stat { padding: 10px 0; text-align: center; border-left: 1px solid var(--line); font-size: 12px; }
  .mcard-stat:first-child { border-left: none; }
  .mcard-stat b { font-family: var(--display); font-weight: 800; font-size: 19px; line-height: 1; color: var(--mc-team, var(--brand)); }
  .mcard-stat span { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); display: block; margin-top: 3px; }
  .prof-bio { font-size: 14px; line-height: 1.6; }
  .prof-bio.placeholder { color: var(--muted); font-style: italic; }
  .sponsor-chip { display: inline-block; padding: 5px 12px; border-radius: 99px; border: 1.5px solid var(--line); font-size: 13px; font-weight: 600; margin: 4px 6px 0 0; }
  .track-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 0; border-top: 1px solid var(--line); }
  .track-row:first-child { border-top: none; }
  .track-row .tn { font-size: 14px; }
  .track-row .tn b { display: block; }
  .track-row .tn span { color: var(--muted); font-size: 12px; }

  /* Link page — dark code panel */
  .link-panel { position: relative; overflow: hidden; border-radius: 16px; color: var(--td); text-align: center; padding: 22px 20px 24px; margin-bottom: 14px; box-shadow: 0 10px 30px rgba(8,10,16,.25);
    background: linear-gradient(165deg, var(--ink-2), var(--ink-0) 70%);
    background: radial-gradient(120% 110% at 100% 0%, color-mix(in srgb, var(--brand) 22%, transparent), transparent 55%), linear-gradient(165deg, var(--ink-2), var(--ink-0) 70%); }
  .link-panel .slbl { justify-content: center; color: var(--td-mute); }
  .link-panel .slbl::before { display: none; }
  .link-code { font-family: var(--display); font-weight: 800; font-size: 40px; letter-spacing: 0.16em; text-align: center; margin: 2px 0 6px; color: #fff; text-indent: 0.16em; }
  .qr-wrap { display: flex; justify-content: center; padding: 8px 0 4px; }
  .qr-wrap canvas { background: #fff; border: none; border-radius: 12px; padding: 10px; }
  .prof-id { text-align: center; font-size: 11px; color: var(--td-mute); word-break: break-all; margin-top: 10px; font-family: ui-monospace, Menlo, monospace; }

  /* Onboarding overlay (mirrors RaceDay's .wiz-overlay) */
  .wiz-overlay { position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px; }
  .wiz-box { background:#fff;border-radius:14px;padding:1.75rem 1.5rem;max-width:440px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18); }

  /* Premium broadcast card — dark hero panel, ghost number, team-color accents */
  .pcard { border-radius: 18px; overflow: hidden; box-shadow: 0 18px 44px rgba(8,10,16,.35); margin-bottom: 14px; background: var(--ink-1); color: var(--td); }
  .pcard-hd { position: relative; overflow: hidden; border-bottom: 3px solid var(--pc-team, var(--brand)); color: #fff; padding: 24px 20px 22px; display: flex; align-items: center; gap: 15px;
    background: linear-gradient(160deg, var(--ink-2), var(--ink-0));
    background: radial-gradient(120% 130% at 100% 0%, color-mix(in srgb, var(--pc-team, var(--brand)) 30%, transparent), transparent 60%), linear-gradient(160deg, var(--ink-2), var(--ink-0)); }
  .pcard-hd::after { content:''; position:absolute; top:0; bottom:0; left:-60%; width:45%; background:linear-gradient(105deg, transparent, rgba(255,255,255,.14), transparent); transform:skewX(-18deg); animation:pcshine 1.6s ease .3s 1 both; }
  @keyframes pcshine { from { left:-60%; } to { left:135%; } }
  .pcard-num { position: absolute; top: -12px; right: -4px; font-family: var(--display); font-weight: 800; font-style: italic; font-size: 108px; line-height: 1; letter-spacing: -0.02em; pointer-events: none;
    color: rgba(110,168,240,.12); -webkit-text-stroke: 1.5px rgba(110,168,240,.4);
    color: color-mix(in srgb, var(--pc-team, var(--brand)) 12%, transparent); -webkit-text-stroke: 1.5px color-mix(in srgb, var(--pc-team, var(--brand)) 40%, transparent); }
  .pcard-hd .nm { position: relative; font-family: var(--display); font-weight: 800; font-size: 28px; text-transform: uppercase; line-height: 0.97; }
  .pcard-hd .meta { position: relative; font-family: var(--display); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: .07em; margin-top: 6px;
    color: #6ea8f0; color: color-mix(in srgb, var(--pc-team, var(--brand)) 60%, #fff); }
  .pcard-photo { position: relative; width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--pc-team, var(--brand)); flex: none; background: #000; }
  .pcard-disc { position: relative; width: 72px; height: 72px; border-radius: 50%; background: var(--ink-3); border: 2.5px solid var(--pc-team, var(--brand)); color: #fff; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 28px; flex: none; }
  .pcard-checker { height: 7px; background: repeating-conic-gradient(#0b0c10 0% 25%, #e9eaee 0% 50%) 0 0/14px 14px; }
  .pcard-stats { display: grid; grid-template-columns: repeat(3,1fr); background: var(--ink-1); border-bottom: 1px solid var(--line-d); }
  .pcard-stat { padding: 15px 6px 16px; text-align: center; border-left: 1px solid var(--line-d); }
  .pcard-stat:first-child { border-left: none; }
  .pcard-stat b { display: block; font-family: var(--display); font-weight: 800; font-size: 26px; line-height: 1; font-variant-numeric: tabular-nums;
    color: #9cc2f2; color: color-mix(in srgb, var(--pc-team, var(--brand)) 68%, #fff); }
  .pcard-stat span { font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--td-mute); font-weight: 600; }
  .pcard-body { padding: 15px 20px 18px; font-size: 14px; }
  .pcard-body .sponsor-chip { border-color: rgba(255,255,255,.22); color: var(--td); }
  .prem-badge { display: inline-block; padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; background: var(--gold); color: #231a02; }
  .pub-status { font-size: 12.5px; color: var(--muted); margin-top: 8px; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

  @media (max-width: 480px) {
    .nav button { padding: 11px 6px; font-size: 12px; }
    .hero-name { font-size: 29px; }
    .hero-num { font-size: 130px; }
    .hero-stats b { font-size: 27px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="brand">DRIVEN</div>
  <div class="tag">Your racing record, wherever you race.</div>
</div>
<div class="checker"></div>

<div class="nav" id="mainNav">
  <button data-page="home" onclick="nav('home')">Home</button>
  <button data-page="card" onclick="nav('card')">Card</button>
  <button data-page="stats" onclick="nav('stats')">Stats</button>
  <button data-page="link" onclick="nav('link')">Link</button>
  <button data-page="settings" onclick="nav('settings')">Settings</button>
</div>

<div class="container">
  <div id="page-home" class="page active"></div>
  <div id="page-card" class="page"></div>
  <div id="page-stats" class="page"></div>
  <div id="page-link" class="page"></div>
  <div id="page-settings" class="page"></div>
</div>

<!-- Onboarding: first-open profile creation -->
<div id="onboardModal" class="wiz-overlay" style="display:none">
  <div class="wiz-box">
    <h2>Welcome to Driven</h2>
    <p class="sub">One racing profile that follows you across every RaceDay track. Create it once — results, stats, and your story all live here.</p>
    <label>Your name *</label>
    <input type="text" id="obName" maxlength="40" placeholder="Alex Smith">
    <label>Email (optional — for backup)</label>
    <input type="email" id="obEmail" maxlength="80" placeholder="alex@example.com">
    <label>Hometown (optional)</label>
    <input type="text" id="obHometown" maxlength="60" placeholder="Columbus, OH">
    <label>Age (optional)</label>

/* ---------- App state ---------- */
var P = null;

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function $id(id) { return document.getElementById(id); }

// Inline SVG icons — one stroke family, sized by .btn svg (no emoji: they render differently per platform).
function icon(name) {
  var paths = {
    broadcast: '<circle cx="10" cy="11" r="1.8"/><path d="M6.9 7.9a4.4 4.4 0 0 0 0 6.2M13.1 7.9a4.4 4.4 0 0 1 0 6.2M4.6 5.6a7.6 7.6 0 0 0 0 10.8M15.4 5.6a7.6 7.6 0 0 1 0 10.8"/>',

function load() {
  try { var raw = localStorage.getItem('profiles_v1'); return raw ? migrate(JSON.parse(raw)) : null; } catch (e) { return null; }
}
function save() {
  localStorage.setItem('profiles_v1', JSON.stringify(P));
  if (P && P.publishedAt) publishCard(true).catch(function () {});   // silent auto-republish; swallow (caller surfaces over-cap/permission issues)
}

function genId() { return 'prof_' + Math.random().toString(36).slice(2, 10) + Math.random().toString(36).slice(2, 6); }

// Fields added after the MVP shipped — fill them in on older stored profiles.
function migrate(p) {
  if (!p) return p;
  p.driver = p.driver || {};
  if (p.driver.number == null) p.driver.number = '';
  if (p.driver.teamColor == null) p.driver.teamColor = '';
  if (p.premiumCode == null) p.premiumCode = '';
  if (p.shortCode == null) p.shortCode = '';
  if (p.publishedAt == null) p.publishedAt = 0;
  return p;
}

function newProfile(name, email, hometown, age) {
  return {
    profileId: genId(),
    driver: { name: name, email: email || '', photo: null, bio: '', hometown: hometown || '', age: age || null, joinedDate: Date.now(), number: '', teamColor: '' },
    linkedTracks: [],
    raceResults: [],
    sponsors: [],
    tier: 'basic',
    premiumCode: '',
    shortCode: '',      // published track-link code (derived from profileId at publish time)
    publishedAt: 0
  };
}

function restoreFromBackupJson(raw) {
  var parsed;
  try { parsed = JSON.parse(raw); } catch (e) { alert("That doesn't look like a valid backup file — couldn't read it."); return; }
  if (!parsed || !parsed.profileId || !parsed.driver || !parsed.driver.name) { alert("That doesn't look like a Driven backup file."); return; }

// original device and can't be pulled back this way.
function restoreFromLinkCode(code) {
  var short = code.trim().toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 20);

  }).then(function (snap) {

/* ---------- Stats ---------- */
function computeStats() {
  var byClass = {};
  P.raceResults.forEach(function (r) {
    if (!byClass[r.class]) byClass[r.class] = { races: 0, wins: 0, podiums: 0 };
    var b = byClass[r.class];
    b.races++;
    if (r.position === 1) { b.wins++; b.podiums++; }
    else if (r.position != null && r.position <= 3) b.podiums++;
  });
  var total = { races: 0, wins: 0, podiums: 0 };
  Object.keys(byClass).forEach(function (k) {
    total.races += byClass[k].races; total.wins += byClass[k].wins; total.podiums += byClass[k].podiums;
  });
  return { byClass: byClass, total: total };
}

      + '<label style="flex:1;margin:0"><input type="text" id="premCode" placeholder="PREM-XXXXXXXX-XXXXXXXX" autocapitalize="characters"> <button class="btn btn-sm" style="margin-top:8px" onclick="activatePremium()">Go premium</button></label>'
      + '</div>'
      + '</div>';
  }
  $id('page-card').innerHTML = h;
}

function selectTier(t) {
  P.tier = t;
  save();
  renderCard();
}

/* ---------- Stats page ---------- */
function renderStats() {
  var stats = computeStats();
  var classes = Object.keys(stats.byClass);
  var h = '<h2>Your Record</h2><p class="sub">Career totals across every linked track.</p>';
  if (!classes.length) {
    h += '<p class="empty">No results yet — your stats will build up as tracks share results with your profile.</p>';
  } else {
    var trio = function (b) {
      return '<div class="trio">'
        + '<div><b>' + b.races + '</b><span>Races</span></div>'
        + '<div><b class="w">' + b.wins + '</b><span>Wins</span></div>'
        + '<div><b>' + b.podiums + '</b><span>Podiums</span></div></div>';
    };
    h += '<div class="slbl">Career Total</div><div class="card"><div class="cls-row">' + trio(stats.total) + '</div></div>';
    h += '<div class="slbl">By class</div><div class="card">';
    classes.forEach(function (c) {
      h += '<div class="cls-row"><div class="cls-name">' + esc(c) + '</div>' + trio(stats.byClass[c]) + '</div>';
    });
    h += '</div>';
    // By track — computed from raceResults, same shape as the class rollup.
    var byTrack = {};
    P.raceResults.forEach(function (r) {
      var k = r.trackName || r.trackId || 'Unknown track';
      if (!byTrack[k]) byTrack[k] = { races: 0, wins: 0, podiums: 0 };
      byTrack[k].races++;
      if (r.position === 1) { byTrack[k].wins++; byTrack[k].podiums++; }
      else if (r.position != null && r.position <= 3) byTrack[k].podiums++;
    });
    var tracks = Object.keys(byTrack);
    if (tracks.length) {
      h += '<div class="slbl">By track</div><div class="card">';
      tracks.forEach(function (t) {
        h += '<div class="cls-row"><div class="cls-name">' + esc(t) + '</div>' + trio(byTrack[t]) + '</div>';
      });
      h += '</div>';
    }
  }
  $id('page-stats').innerHTML = h;
}

/* ---------- Link page ---------- */
function renderLink() {
  var h = '<h2>Link a Track</h2><p class="sub">Give the sign-up table your link code (or show this QR) to connect your card and results to this profile.</p>';
  h += '<div class="link-panel">'
    + (P.shortCode
        ? '<div class="slbl">Your track link code</div><div class="link-code">' + esc(P.shortCode) + '</div>'
        : '<p class="empty" style="text-align:center;color:var(--td-mute)">Publish your card (Card page) to get a short link code.</p>')
    + '<div class="qr-wrap"><canvas id="linkQR" width="220" height="220"></canvas></div>'
    + '<div class="prof-id">' + esc(P.profileId) + '</div></div>';
  h += '<div class="slbl">Linked tracks</div>';
  if (!P.linkedTracks.length) {
    h += '<p class="empty">No tracks linked yet.</p>';
  } else {
    h += '<div class="card">' + P.linkedTracks.map(function (t) {
      var count = P.raceResults.filter(function (r) { return r.trackId === t.trackId; }).length;
      return '<div class="track-row"><div class="tn"><b>' + esc(t.trackName) + '</b><span>' + count + ' race' + (count === 1 ? '' : 's') + ' recorded</span></div>'
        + '<button class="btn btn-sm" onclick="unlinkTrack(\'' + t.trackId + '\')">Unlink</button></div>';
    }).join('') + '</div>';
  }
  $id('page-link').innerHTML = h;
  var cv = $id('linkQR');
  if (cv) drawQR(cv, 'RDPROFILE:' + P.profileId);
}

function unlinkTrack(trackId) {
  if (!confirm('Unlink this track? Your past results stay in your history, but the track will stop being listed here.')) return;
  P.linkedTracks = P.linkedTracks.filter(function (t) { return t.trackId !== trackId; });
  save();
  renderLink();
}

/* ---------- Settings page ---------- */
function renderSettings() {
  var d = P.driver;
  var h = '<h2>Settings</h2>';
  h += '<div class="card">'
    + '<div class="slbl">Profile</div>'
    + '<label>Name</label><input type="text" id="stName" value="' + esc(d.name) + '" maxlength="40">'
    + '<label>Email</label><input type="email" id="stEmail" value="' + esc(d.email) + '" maxlength="80">'
    + '<label>Kart / vehicle number</label><input type="text" id="stNumber" value="' + esc(d.number || '') + '" maxlength="5" placeholder="e.g. 47 or 12A" autocapitalize="characters">'
    + '<label>Team color</label><input type="color" id="stTeamColor" value="' + esc(/^#[0-9a-fA-F]{6}$/.test(d.teamColor || '') ? d.teamColor : '#1f6fd6') + '" style="height:44px;padding:4px">'
    + '<label>Driver photo</label>'
    + '<div style="display:flex;gap:10px;align-items:center">'
    + (photoOK(d.photo) ? '<img src="' + d.photo + '" style="width:44px;height:44px;border-radius:50%;object-fit:cover">' : '')
    + '<button class="btn btn-sm" type="button" onclick="$id(\'stPhotoFile\').click()">' + icon('camera') + ' ' + (photoOK(d.photo) ? 'Replace' : 'Upload') + '</button>'
    + (photoOK(d.photo) ? '<button class="btn btn-sm" type="button" onclick="removePhoto()">Remove</button>' : '')
    + '<input id="stPhotoFile" type="file" accept="image/*" style="display:none" onchange="uploadPhoto(this)">'
    + '</div>'
    + '<label>Hometown</label><input type="text" id="stHometown" value="' + esc(d.hometown) + '" maxlength="60">'
    + '<label>Age</label><input type="number" id="stAge" value="' + (d.age || '') + '" min="1" max="120">'
    + '<label>Bio (max 280 characters)</label><textarea id="stBio" maxlength="280">' + esc(d.bio) + '</textarea>'
    + '<label>Sponsors (comma-separated)</label><input type="text" id="stSponsors" maxlength="150" value="' + esc(P.sponsors.map(function (s) { return s.name; }).join(', ')) + '" placeholder="Smith Auto, FastKarts">'
    + '<button class="btn btn-primary btn-block" onclick="saveProfileFields()" style="margin-top:16px">Save changes</button>'
    + '</div>';

  h += '<div class="card">'
    + '<div class="slbl">Import results</div>'
    + '<p class="sub" style="margin-bottom:10px">Paste a results export from RaceDay (JSON) to add races to your profile.</p>'
    + '<textarea id="importJson" placeholder="Paste RaceDay export JSON here"></textarea>'
    + '<button class="btn btn-block" onclick="importResultsFromText()" style="margin-top:10px">Import</button>'
    + '<button class="btn btn-block" onclick="loadDemoResults()" style="margin-top:8px">Load demo results (try it out)</button>'
    + '</div>';

  h += '<div class="card">'
    + '<div class="slbl">Back up your profile</div>'
    + '<p class="sub" style="margin-bottom:10px">Save a copy of everything — your identity, sponsors, and full race history. This is the only way to fully restore your profile on a new device or browser; a link code alone can\'t bring your race history back.</p>'
    + '<button class="btn btn-block" onclick="backupProfile()">Download backup</button>'
    + '</div>';

  h += '<div class="card">'
    + '<div class="slbl" style="color:var(--pit-red)">Danger zone</div>'
    + '<button class="btn btn-danger btn-block" onclick="deleteProfile()">Delete my profile</button>'
    + '</div>';

  $id('page-settings').innerHTML = h;
}

function saveProfileFields() {
  P.driver.name = ($id('stName').value || '').trim() || P.driver.name;
  P.driver.email = ($id('stEmail').value || '').trim();
  P.driver.number = ($id('stNumber').value || '').trim().toUpperCase().slice(0, 5);
  var col = $id('stTeamColor').value;
  P.driver.teamColor = /^#[0-9a-fA-F]{6}$/.test(col) ? col : '';
  P.driver.hometown = ($id('stHometown').value || '').trim();
  var ageVal = $id('stAge').value;
  P.driver.age = ageVal ? parseInt(ageVal, 10) : null;
  P.driver.bio = ($id('stBio').value || '').trim();
  var sponsorsRaw = ($id('stSponsors').value || '').trim();
  P.sponsors = sponsorsRaw ? sponsorsRaw.split(',').map(function (s) { return { name: s.trim() }; }).filter(function (s) { return s.name; }) : [];
  save();
  // Don't promise the published card updated if the new values exceed a field cap — the
  // auto-republish in save() would be silently rejected by the rules.
  var tooLong = P.publishedAt ? cardTooLong() : null;
  if (tooLong) alert('Saved on this device — but your PUBLISHED card can\'t update: ' + tooLong);
  else alert('Saved.' + (P.publishedAt ? ' Your published card updates automatically.' : ''));
}

// Photo: center-crop square, downscale to 128px JPEG (~≤60KB) so published cards stay light.
function uploadPhoto(input) {
  var f = input.files && input.files[0];
  input.value = '';
  if (!f) return;
  var img = new Image();
  var url = URL.createObjectURL(f);
  img.onload = function () {
    URL.revokeObjectURL(url);
    var side = Math.min(img.width, img.height);
    var scale = Math.min(1, 128 / side);
    var c = document.createElement('canvas');
    c.width = c.height = Math.max(1, Math.round(side * scale));
    c.getContext('2d').drawImage(img, (img.width - side) / 2, (img.height - side) / 2, side, side, 0, 0, c.width, c.height);
    var data = c.toDataURL('image/jpeg', 0.82);
    if (data.length > 60000) { alert('That photo is too heavy — try a smaller or simpler image.'); return; }
    P.driver.photo = data;
    save();
    renderSettings();
  };
  img.onerror = function () { URL.revokeObjectURL(url); alert("Couldn't read that file as an image."); };
  img.src = url;
}
function removePhoto() { P.driver.photo = null; save(); renderSettings(); }

/* ---------- Import / ingest ---------- */
// Accepts a single export object or an array of them:
// { trackId, trackName, date, results: [{ profileId?, name, class, position, points }] }
function ingestExport(data) {
  var exportsArr = Array.isArray(data) ? data : [data];
  var added = 0;
  exportsArr.forEach(function (exp) {
    if (!exp || !exp.trackId || !Array.isArray(exp.results)) return;
    var trackLinked = false;
    exp.results.forEach(function (r) {
      if (r.profileId && r.profileId !== P.profileId) return;
      if (!r.class) return;
      var exists = P.raceResults.some(function (x) { return x.trackId === exp.trackId && x.date === exp.date && x.class === r.class; });
      if (exists) return;
      P.raceResults.push({
        date: exp.date, trackId: exp.trackId, trackName: exp.trackName || exp.trackId, class: r.class,
        position: r.position != null ? Number(r.position) : null, points: r.points != null ? Number(r.points) : null
      });
      added++; trackLinked = true;
    });
    if (trackLinked && !P.linkedTracks.some(function (t) { return t.trackId === exp.trackId; })) {
      P.linkedTracks.push({ trackId: exp.trackId, trackName: exp.trackName || exp.trackId, linkedDate: Date.now() });
    }
  });
  if (added) save();
  return added;
}

function importResultsFromText() {
  var raw = ($id('importJson').value || '').trim();
  if (!raw) { alert('Paste JSON first.'); return; }
  var data;
  try { data = JSON.parse(raw); } catch (e) { alert('That doesn\'t look like valid JSON.'); return; }
  var added = ingestExport(data);
  alert(added + ' new result' + (added === 1 ? '' : 's') + ' imported.');
  $id('importJson').value = '';
  renderSettings();
}

function loadDemoResults() {
  var demo = [
    { trackId: 'raceday_riverside', trackName: 'Riverside Kart Park', date: '2026-06-14', results: [{ class: 'Junior 80cc', position: 1, points: 25 }] },
    { trackId: 'raceday_riverside', trackName: 'Riverside Kart Park', date: '2026-06-21', results: [{ class: 'Junior 80cc', position: 3, points: 18 }] },
    { trackId: 'raceday_riverside', trackName: 'Riverside Kart Park', date: '2026-06-28', results: [{ class: 'Junior 80cc', position: 2, points: 21 }] },
    { trackId: 'raceday_lonestar', trackName: 'Lonestar Speedway', date: '2026-06-20', results: [{ class: 'Senior 100cc', position: 1, points: 25 }] },
    { trackId: 'raceday_lonestar', trackName: 'Lonestar Speedway', date: '2026-06-27', results: [{ class: 'Senior 100cc', position: 5, points: 12 }] }
  ];
  var added = ingestExport(demo);
  alert('Loaded ' + added + ' demo result' + (added === 1 ? '' : 's') + '. Check Home and Stats!');
  renderSettings();
}

function deleteProfile() {
  if (!confirm('Delete your profile? This cannot be undone.')) return;
  if (!confirm('Really delete everything — profile, results, and stats?')) return;
  // Best-effort: remove the published card + link-code mapping, then wipe locally either way.
  var wipe = function () { localStorage.removeItem('profiles_v1'); location.reload(); };
  if (P.publishedAt) {
    ensureFirebase().then(function () {
      var db = firebase.database();
      var ops = [db.ref('profiles/' + P.profileId).remove()];
      if (P.shortCode) ops.push(db.ref('profiles_short/' + P.shortCode).remove());
      return Promise.all(ops);
    }).then(wipe, wipe);
  } else wipe();
}

/* ---------- Boot ---------- */
P = load();
if (!P) { openOnboarding(); } else { nav('home'); }
</script>
